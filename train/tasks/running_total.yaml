# Corpus task (implement: accumulation).
prompt: >
  Create accumulate.py with running_total(nums) returning the list of cumulative sums
  (running_total([1,2,3]) -> [1,3,6]). Make test_accumulate.py pass, then run it.

setup:
  test_accumulate.py: |
    from accumulate import running_total

    assert running_total([1, 2, 3, 4]) == [1, 3, 6, 10]
    assert running_total([5]) == [5]
    assert running_total([]) == []
    assert running_total([2, -2, 3]) == [2, 0, 3]
    print("PASS")

verify: "python test_accumulate.py"
