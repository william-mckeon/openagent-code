# Corpus task (implement: stack, matching/nesting).
prompt: >
  Create brackets.py with is_balanced(s) returning True iff the brackets (), [], {} in s are
  correctly matched and nested (other characters are ignored). Make test_brackets.py pass,
  then run it.

setup:
  test_brackets.py: |
    from brackets import is_balanced

    assert is_balanced("()[]{}") is True
    assert is_balanced("([{}])") is True
    assert is_balanced("a(b)c[d]") is True
    assert is_balanced("(]") is False
    assert is_balanced("(()") is False
    assert is_balanced("") is True
    print("PASS")

verify: "python test_brackets.py"
