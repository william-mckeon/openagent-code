# Discriminating: the happy-path case (95 -> A) ALREADY passes, so a shallow agent
# that eyeballs one example thinks the code is fine. The verify also asserts the
# boundary scores (90, 80, 70), where the bug lives: `>` should be `>=`. And it
# checks EVERY boundary, so fixing only the one that's obviously wrong still fails -
# the fix has to be applied consistently across all the comparisons.
prompt: >
  grades.py assigns letter grades from a score, but test_grades.py fails on the
  boundary scores. Fix the boundary logic so all of the test's cases pass, then run
  the test.

setup:
  grades.py: |
    def letter(score):
        if score > 90:
            return "A"
        elif score > 80:
            return "B"
        elif score > 70:
            return "C"
        else:
            return "F"

  test_grades.py: |
    from grades import letter

    assert letter(95) == "A"
    assert letter(90) == "A", f"90 is the A cutoff, got {letter(90)}"
    assert letter(85) == "B"
    assert letter(80) == "B", f"80 is the B cutoff, got {letter(80)}"
    assert letter(70) == "C", f"70 is the C cutoff, got {letter(70)}"
    assert letter(69) == "F"
    print("PASS")

verify: "python test_grades.py"
