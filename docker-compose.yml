# ============================================================================
# openagent-code - local development compose
# ============================================================================
#
# One service: the openagent-code CLI agent. Unlike the other OpenAgent
# services this is NOT a daemon — it runs one coding task and exits — so it has
# no ports, no healthcheck, no restart policy, and does not attach to
# openagent-network. It depends on no other service.
#
# Because it is one-shot, use `run` rather than `up`:
#
#   docker compose build
#   docker compose run --rm openagent-code "add a docstring to foo.py and run the tests"
#
# Prerequisites
# -------------
#   cp .env.example .env
#   # then edit .env  (at minimum CODE_API_BASE + CODE_API_KEY for your endpoint)
#
# Workspace
# ---------
# CODE_WORKSPACE selects the repo the agent edits, mounted at /workspace.
# Defaults to ./workspace; point it at any repo:
#
#   CODE_WORKSPACE=/path/to/your/repo docker compose run --rm openagent-code "..."
#
# Trajectories (training data) are written under the workspace by default; the
# mount means they persist on the host after the container exits.
#
# When editing .env
# -----------------
# `docker compose run` reads env_file fresh each invocation, so changes to .env
# take effect on the next run with no rebuild.
# ============================================================================

# Project name — otherwise Compose derives it from the folder (OpenCode -> the
# "opencode_*" network/container names). Pin it to the service family instead.
name: openagent-code

services:
  openagent-code:
    build:
      context: .
      dockerfile: docker/code/Dockerfile
    image: openagent-code:latest
    container_name: openagent-code

    # All config + secrets come from .env (created from .env.example).
    env_file:
      - .env

    environment:
      # The container always edits the mounted repo at /workspace.
      CODE_WORKSPACE: "/workspace"

    volumes:
      # The repo the agent works on. The ./workspace default is an EMPTY placeholder
      # — running against it produces a no_action run with nothing to edit. Point
      # CODE_WORKSPACE at a real repo:
      #   CODE_WORKSPACE=/path/to/your/repo docker compose run --rm openagent-code "..."
      - "${CODE_WORKSPACE:-./workspace}:/workspace"

    # One-shot CLI: no ports, no restart policy, no network. Pass the task as
    # the command:  docker compose run --rm openagent-code "your task here".

  # --------------------------------------------------------------------------
  # train — GPU LoRA-SFT of the student (distillation Stage 5/6, specs/0005).
  # Runs train/sft.py in a clean CUDA Linux container on a LOCAL NVIDIA GPU, which
  # sidesteps the host's Windows DLL block + torch/peft version clash.
  #   docker compose build train
  #   docker compose run --rm train python -m train.sft --model openai/gpt-oss-20b --epochs 1 --load-4bit
  # The trainer code + data are MOUNTED, so editing sft.py or adding tasks needs no rebuild.
  # --------------------------------------------------------------------------
  train: &train-base
    build:
      context: .
      dockerfile: docker/train/Dockerfile
    image: openagent-code-train:latest
    container_name: openagent-code-train
    env_file:
      - .env                      # capture/convert need the teacher; sft ignores it
    shm_size: "8gb"
    # Pass the local NVIDIA GPU into the container (NVIDIA Container Toolkit required).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./src:/app/src            # live code (no rebuild on change)
      - ./eval:/app/eval          # convert.py imports eval.rubric
      - ./train:/app/train        # sft.py, tasks, dataset, checkpoints
      - ./trajectories:/app/trajectories
      - training-cache:/app/.cache  # HF/model downloads persist across runs
    command: python -m train.sft --help

  # train-smoke — same image, NO GPU: proves the pipeline on CPU (tiny model, few steps).
  train-smoke:
    <<: *train-base
    container_name: openagent-code-train-smoke
    shm_size: "2gb"
    deploy: {}                    # no GPU reservation — CPU run
    command: python -m train.sft --smoke

  # --------------------------------------------------------------------------
  # serve — the merged student on a vLLM OpenAI-compatible endpoint (Stage 6).
  # First merge the adapter:  docker compose run --rm train python -m train.merge --adapter train/checkpoints/student
  # then:                     docker compose up serve
  # then point .env at it:    CODE_MODEL=openai/student   CODE_API_BASE=http://localhost:8000/v1
  # --------------------------------------------------------------------------
  serve:
    build:
      context: .
      dockerfile: docker/serve/Dockerfile
    image: openagent-code-serve:latest
    container_name: openagent-code-serve
    ports:
      - "8000:8000"
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./train/checkpoints:/checkpoints       # the merged student lives here
      - training-cache:/root/.cache            # reuse the HF cache
    # Serve the merged student. --served-model-name is the id the agent uses (CODE_MODEL=openai/student).
    # --tool-call-parser/--enable-auto-tool-choice make it emit OpenAI tool_calls (match the training).
    # Tune --tool-call-parser to the student family (hermes for Qwen2.5); --max-model-len/--gpu-memory
    # for your 16GB card. The student-merged dir comes from `python -m train.merge`.
    command: >
      --model /checkpoints/student-merged
      --served-model-name student
      --port 8000
      --tool-call-parser hermes
      --enable-auto-tool-choice
      --max-model-len 8192
      --gpu-memory-utilization 0.90

# Named volume for the HuggingFace / model cache, so the student base (and tokenizer)
# download once and persist across training runs instead of every container.
volumes:
  training-cache:
    name: openagent-code-training-cache
